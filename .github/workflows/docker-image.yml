name: Build and Push ComfyUI to Docker Hub

on:
  push:
    branches: [ "main" ]  # Trigger whenever you push to the main branch
  workflow_dispatch:      # Allows you to trigger it manually from the "Actions" tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container # Better for large AI images

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tags the image with 'latest' and the short commit hash
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-flux:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-flux:${{ github.sha }}
          # Use GitHub's cache to make subsequent builds faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
